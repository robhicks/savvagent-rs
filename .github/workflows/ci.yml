name: CI

on:
  pull_request:
  push:
    branches: [master, main]

# Cancel in-flight runs on the same ref when a new push comes in. Saves CI
# minutes on PRs that get force-pushed.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # Lint runs once on Linux: rustfmt and clippy don't differ by host so there's
  # no point running them three times.
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # `keyring`'s sync-secret-service backend pulls libdbus-sys, whose
      # build.rs needs the system libdbus headers. Not installed by default
      # on the GH ubuntu runner image.
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets

  # Cross-platform build + test. We exercise every target we ship binaries for
  # so platform-specific code (keyring backends, path handling) is covered
  # before a release tag triggers the full dist build.
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # libdbus-1-dev is required for keyring's secret-service backend on
      # Linux. The ubuntu GH runner image doesn't ship it preinstalled.
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - name: build
        run: cargo build --workspace --all-targets
      - name: test
        run: cargo test --workspace --no-fail-fast

  # Cross-vendor `tool_use_id` compatibility gate. Each (sender, receiver)
  # pair across the three shipping vendors gets its own #[tokio::test] in
  # `crates/savvagent-host/tests/cross_vendor_history.rs`; `--no-fail-fast`
  # ensures every failing pair appears in the job log instead of stopping
  # at the first. See docs/superpowers/specs/2026-05-15-multi-provider-pool-and-auto-routing-design.md
  # ("Phase 2 gate") for the contract this job enforces.
  #
  # Live-vendor twins are #[ignore]-marked and run manually via
  # `cargo test -p savvagent-host --test cross_vendor_history -- --ignored`
  # with the appropriate *_API_KEY env vars set; this PR-CI job covers only
  # the offline mocked matrix.
  cross-vendor-gate:
    name: cross-vendor compatibility gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux system deps
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - name: cross-vendor matrix
        run: cargo test -p savvagent-host --test cross_vendor_history -- --no-fail-fast

  # Validate the dist config still parses on every PR. The release workflow
  # also does this, but having it here keeps the failure mode obvious when a
  # contributor tweaks the [workspace.metadata.dist] block.
  dist-plan:
    name: dist plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dist
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh \
            | sh
      - name: dist plan
        run: dist plan
