name: CI

on:
  pull_request:
  push:
    branches: [master, main]

# Cancel in-flight runs on the same ref when a new push comes in. Saves CI
# minutes on PRs that get force-pushed.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # Lint runs once on Linux: rustfmt and clippy don't differ by host so there's
  # no point running them three times.
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets

  # Cross-platform build + test. We exercise every target we ship binaries for
  # so platform-specific code (keyring backends, path handling) is covered
  # before a release tag triggers the full dist build.
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build
        run: cargo build --workspace --all-targets
      - name: test
        run: cargo test --workspace --no-fail-fast

  # Validate the dist config still parses on every PR. The release workflow
  # also does this, but having it here keeps the failure mode obvious when a
  # contributor tweaks the [workspace.metadata.dist] block.
  dist-plan:
    name: dist plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dist
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh \
            | sh
      - name: dist plan
        run: dist plan
