[package]
name = "savvagent"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
crossterm = "0.29.0"
ratatui = { version = "0.30.0", features = ["crossterm_0_29"] }
tokio = { version = "1.52.1", features = ["full"] }
tui-input = "0.14.0"
serde = { version = "1.0.218", features = ["derive"] }
serde_json = "1.0.139"
async-trait = "0.1.86"
reqwest = { version = "0.13.3", features = ["json"] }
dotenvy = "0.15.7"
uuid = { version = "1.23.1", features = ["v4"] }
rust-i18n = "3.1"
ratatui-explorer = "0.3.0"
ratatui-code-editor = "0.0.2"